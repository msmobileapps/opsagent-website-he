[build]
  publish = "."
  command = "echo 'Static site — no build needed'"

[build.environment]
  NODE_VERSION = "20"

# Redirect old /he/ paths to root (Hebrew is now the default)
[[redirects]]
  from = "/he/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/he"
  to = "/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
